services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: doshka_php
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-dev}
    depends_on:
      - postgres
      - redis
    networks:
      - doshka_net

  nginx:
    image: nginx:1.25-alpine
    container_name: doshka_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - doshka_net

  postgres:
    image: postgres:16-alpine
    container_name: doshka_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-doshka}
      POSTGRES_USER: ${POSTGRES_USER:-doshka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doshka_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - doshka_net

  redis:
    image: redis:7-alpine
    container_name: doshka_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - doshka_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: doshka_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # Web UI
      - "1025:1025"   # SMTP
    networks:
      - doshka_net

volumes:
  postgres_data:
  redis_data:

networks:
  doshka_net:
    driver: bridge
